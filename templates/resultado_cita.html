{% extends "base.html" %}

{% block content %}
<h2 class="h4 mb-3">Actualizar Cita</h2>
<form method="post" class="card card-body shadow-sm">
    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Documento</label>
            <input type="text" class="form-control" value="{{ cita.documento }}" disabled />
        </div>
        <div class="col-md-4">
            <label class="form-label">Médico</label>
            <input type="text" name="medico" class="form-control" value="{{ cita.medico }}" required />
        </div>
        <div class="col-md-4">
            <label class="form-label">Tipo de cita</label>
            <select name="tipo_cita" class="form-select" required>
                <option value="General" {% if cita.tipo_cita == 'General' %}selected{% endif %}>General</option>
                <option value="Odontología" {% if cita.tipo_cita == 'Odontología' %}selected{% endif %}>Odontología</option>
                <option value="Especialista" {% if cita.tipo_cita == 'Especialista' %}selected{% endif %}>Especialista</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Fecha</label>
            <input type="date" name="fecha" class="form-control" value="{{ cita.fecha }}" required />
        </div>
        <div class="col-md-3">
            <label class="form-label">Hora</label>
            <input type="time" name="hora" class="form-control" value="{{ cita.hora }}" required />
        </div>
        <div class="col-md-6">
            <label class="form-label">Dirección EPS</label>
            <input type="text" class="form-control" value="{{ cita.direccion_eps }}" disabled />
        </div>
    </div>

    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-main" type="submit">Actualizar cita</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('consultar_cita') }}">Volver</a>
    </div>
</form>
{% endblock %}
