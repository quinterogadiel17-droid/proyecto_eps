{% extends "base.html" %}

{% block content %}
<h2 class="h4 mb-3">Consulte su EPS</h2>
<form method="post" class="card card-body shadow-sm mb-4">
    <div class="row g-3 align-items-end">
        <div class="col-md-5">
            <label class="form-label">Documento del paciente</label>
            <input type="text" name="documento" class="form-control" value="{{ documento }}" required />
        </div>
        <div class="col-md-3">
            <button class="btn btn-main" type="submit">Consultar EPS</button>
        </div>
    </div>
</form>

{% if paciente %}
<div class="card card-body shadow-sm">
    <div class="row g-3">
        <div class="col-md-3">
            <label class="form-label">Documento</label>
            <input class="form-control" value="{{ paciente.documento }}" readonly disabled />
        </div>
        <div class="col-md-3">
            <label class="form-label">Nombre</label>
            <input class="form-control" value="{{ paciente.nombre }}" readonly disabled />
        </div>
        <div class="col-md-3">
            <label class="form-label">Apellido</label>
            <input class="form-control" value="{{ paciente.apellido }}" readonly disabled />
        </div>
        <div class="col-md-3">
            <label class="form-label">EPS registrada</label>
            <input class="form-control" value="{{ paciente.eps }}" readonly disabled />
        </div>
    </div>
</div>
{% endif %}
{% endblock %}
